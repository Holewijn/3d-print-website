# ============================================================
# AdminPortal — NGINX Reverse Proxy Config
# Place at: /etc/nginx/sites-available/adminportal.conf
# Symlink:  ln -s /etc/nginx/sites-available/adminportal.conf /etc/nginx/sites-enabled/
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=adminportal_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=adminportal_api:10m   rate=60r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name admin.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.yourdomain.com;

    # ── SSL (managed by Certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/admin.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    server_tokens off;
    client_max_body_size 10M;

    # ── Proxy Settings (shared) ───────────────────────────
    # Replace 192.168.1.50 with your LXC container IP
    set $backend http://192.168.1.50:3000;

    # ── Login — strict rate limit ─────────────────────────
    location /auth/login {
        limit_req zone=adminportal_login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass       $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth routes ───────────────────────────────────────
    location /auth/ {
        proxy_pass       $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API — moderate rate limit ─────────────────────────
    location /api/ {
        limit_req zone=adminportal_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass       $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }

    # ── Uploaded media — served with cache headers ────────
    location /uploads/ {
        proxy_pass       $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header       Cache-Control "public, max-age=604800, immutable";
        add_header       X-Content-Type-Options "nosniff" always;
    }

    # ── Static assets — aggressive cache ─────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        proxy_pass       $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header       Cache-Control "public, max-age=2592000, immutable";
        expires 30d;
    }

    # ── SPA fallback — all other routes ──────────────────
    location / {
        proxy_pass       $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
    }

    # ── Block dotfiles ────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/adminportal_access.log combined;
    error_log  /var/log/nginx/adminportal_error.log warn;
}
