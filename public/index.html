<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdminPortal v2.1.0</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><path d='M8 10h16M8 16h10M8 22h13' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen hidden">
  <div class="login-bg">
    <div class="login-glow"></div>
    <div class="login-grid"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#3b82f6"/>
        <path d="M10 12h20M10 20h13M10 28h16" stroke="white" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>AdminPortal</h1>
        <span>v2.1.0</span>
      </div>
    </div>
    <p class="login-subtitle">Sign in to your dashboard</p>
    <div id="loginError" class="login-error hidden"></div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" value="admin@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" value="admin123" />
    </div>
    <button id="loginBtn" class="btn-primary btn-full">
      <span>Sign In</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <p class="login-hint">Default: admin@example.com / admin123</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app-layout hidden">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="8" fill="#3b82f6"/>
          <path d="M10 12h20M10 20h13M10 28h16" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <div class="sidebar-brand">
          <span class="brand-name">AdminPortal</span>
          <span class="brand-version">v2.1.0</span>
        </div>
      </div>
      <div class="sidebar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Search menu..." id="menuSearch" />
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a class="nav-item active" data-page="dashboard" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>

      <div class="nav-section-label">Content</div>
      <a class="nav-item" data-page="pages" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Pages
      </a>
      <a class="nav-item" data-page="media" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Media Library
      </a>

      <div class="nav-section-label">Administration</div>
      <a class="nav-item admin-only" data-page="users" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </a>
      <a class="nav-item admin-only" data-page="plugins" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
        Plugins
        <span class="nav-badge" id="pluginBadge">0</span>
      </a>

      <div class="nav-section-label">Configuration</div>
      <a class="nav-item" data-page="seo" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        SEO
      </a>
      <a class="nav-item admin-only" data-page="settings" href="#">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sidebarAvatar">JD</div>
        <div class="user-info">
          <span class="user-name" id="sidebarName">John Doe</span>
          <span class="user-role" id="sidebarRole">Administrator</span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb">
          <span id="pageTitle">Dashboard</span>
          <span class="breadcrumb-sub" id="pageSubtitle">Overview &amp; System Summary</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn notif-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot">3</span>
        </button>
        <div class="topbar-user">
          <div class="user-avatar sm" id="topbarAvatar">JD</div>
          <span id="topbarName">John Doe</span>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT AREA -->
    <div class="page-content" id="pageContent">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<!-- TOAST CONTAINER -->
<div id="toastContainer" class="toast-container"></div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
